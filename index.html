<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caption Genius AI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f0f2f5; }
        .container { max-width: 600px; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; margin-bottom: 20px; }
        textarea { min-height: 120px; margin-bottom: 15px; }
        button { width: 100%; padding: 12px; background-color: #6200EE; color: white; border: none; border-radius: 4px; font-size: 1.1em; cursor: pointer; transition: background-color 0.3s ease; }
        button:hover { background-color: #3700B3; }
        #caption-output { background-color: #f9f9f9; border: 1px solid #ddd; padding: 15px; border-radius: 4px; margin-top: 20px; white-space: pre-wrap; font-family: monospace; }
        .price-chip { display: inline-block; background-color: #FFEE58; padding: 5px 10px; border-radius: 20px; font-weight: bold; margin-bottom: 15px; }
         a.button { text-decoration: none; display: inline-block; width: 100%; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <main class="container">
        <article>
            <h1>Caption Genius AI</h1>
            <p class="price-chip">One-time purchase: $9.99</p>
            <p>Generate engaging Instagram captions instantly!</p>
            <form onsubmit="event.preventDefault(); document.getElementById('caption-output').innerText = 'Generating...'; alert('Feature coming soon! For now, purchase below.');">
                <label for="keywords">Keywords/Themes (e.g., 'summer vibes', 'coffee shop', 'motivation'):</label>
                <textarea id="keywords" name="keywords" placeholder="Enter keywords, separated by commas..." rows="4" required></textarea>
                <button type="submit">Generate Caption</button>
            </form>
            <h2>Your Caption:</h2>
            <pre id="caption-output">Your generated caption will appear here.</pre>
            <a href="#" onclick="window.open('https://buy.stripe.com/test_8wM4g5fQqcK88GQaEG', '_blank'); return false;" class="button">Buy Now for $9.99</a>
            <small><i>Note: This is a demo. Actual caption generation and payment integration are implemented server-side.</i></small>
        </article>
    </main>
</body>
</html>
